<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>劫寨 · 祝家庄 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1410; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  #app { position: relative; width: 100%; height: 100%; }
  #gl { display: block; width: 100%; height: 100%; }
  #ui { position: absolute; inset: 0; pointer-events: none; }
  #ui > * { pointer-events: auto; }

  /* 顶部资源条 */
  #topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; gap: 18px; align-items: center;
    padding: 10px 16px; background: linear-gradient(180deg, rgba(0,0,0,.6), transparent); color: #f0e6d2; font-size: 14px; }
  .res { display: flex; align-items: center; gap: 6px; }
  .res b { color: #ffd27a; font-size: 16px; }
  #alertBadge { margin-left: auto; padding: 3px 10px; border-radius: 4px; background: #444; font-weight: bold; }
  #timer { font-variant-numeric: tabular-nums; color: #ffd27a; font-weight: bold; }

  /* 编队栏 */
  #squad { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
  .slot { width: 72px; padding: 6px 4px; background: rgba(30,24,18,.92); border: 2px solid #6b543a; border-radius: 8px;
    color: #f0e6d2; text-align: center; cursor: pointer; transition: all .15s; user-select: none; }
  .slot:hover { border-color: #ffd27a; transform: translateY(-3px); }
  .slot.selected { border-color: #ffd27a; background: rgba(80,60,30,.95); box-shadow: 0 0 12px rgba(255,210,122,.4); }
  .slot.disabled { opacity: .4; cursor: not-allowed; }
  .slot .face { font-size: 22px; }
  .slot .nm { font-size: 12px; font-weight: bold; margin: 2px 0; }
  .slot .cost { font-size: 11px; color: #ffd27a; }
  .slot .cd { font-size: 10px; color: #e88; }
  .slot .key { position: absolute; top: 2px; left: 5px; font-size: 10px; color: #999; }
  .slot { position: relative; }

  /* 技能栏（选中单位） */
  #skillbar { position: absolute; bottom: 12px; right: 16px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .skillbtn { min-width: 130px; padding: 8px 12px; background: rgba(30,24,18,.92); border: 2px solid #6b543a; border-radius: 8px;
    color: #f0e6d2; font-size: 13px; cursor: pointer; text-align: left; }
  .skillbtn:hover { border-color: #ffd27a; }
  .skillbtn .k { color: #ffd27a; font-weight: bold; margin-right: 6px; }
  .skillbtn .cd { float: right; color: #e88; }
  .skillbtn.ready { border-color: #7a4; }
  #ragebar { width: 130px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
  #ragefill { height: 100%; width: 0%; background: linear-gradient(90deg, #e80, #fc3); transition: width .2s; }

  /* 指令栏 */
  #orderbar { position: absolute; bottom: 12px; left: 16px; display: flex; flex-direction: column; gap: 6px; }
  .orderbtn { padding: 7px 12px; background: rgba(30,24,18,.92); border: 2px solid #6b543a; border-radius: 8px;
    color: #f0e6d2; font-size: 12px; cursor: pointer; }
  .orderbtn:hover { border-color: #ffd27a; }
  .orderbtn .k { color: #ffd27a; font-weight: bold; margin-right: 5px; }

  /* 提示 */
  #hint { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); padding: 6px 18px;
    background: rgba(0,0,0,.65); color: #ffd27a; border-radius: 6px; font-size: 14px; }
  #scoutMask { position: absolute; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: #f0e6d2; }
  #scoutMask h2 { font-size: 28px; color: #ffd27a; }
  #scoutMask .count { font-size: 48px; font-weight: bold; color: #ffd27a; }
  .bigbtn { padding: 12px 32px; font-size: 18px; background: #a33; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .bigbtn:hover { background: #c44; }
  .orderCard { width: 130px; padding: 14px 10px; background: rgba(40,32,24,.95); border: 2px solid #6b543a; border-radius: 10px;
    color: #f0e6d2; cursor: pointer; text-align: center; transition: all .15s; }
  .orderCard:hover { border-color: #ffd27a; transform: translateY(-3px); }
  .orderCard.selected { border-color: #ffd27a; background: rgba(90,70,35,.95); box-shadow: 0 0 14px rgba(255,210,122,.4); }
  .orderCard .nm { font-size: 16px; font-weight: bold; color: #ffd27a; margin-bottom: 6px; }
  .orderCard .ds { font-size: 12px; color: #cbb; line-height: 1.5; }

  /* 结算 */
  #endPanel { position: absolute; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; }
  #endCard { background: #2a211a; border: 3px solid #6b543a; border-radius: 14px; padding: 32px 44px; color: #f0e6d2; text-align: center; min-width: 380px; }
  #endCard h1 { color: #ffd27a; margin-bottom: 8px; }
  #stars { font-size: 44px; letter-spacing: 8px; margin: 10px 0; }
  .star-on { color: #ffd27a; } .star-off { color: #555; }
  #endInfo { font-size: 14px; color: #cbb; margin: 12px 0; line-height: 1.8; }
  #reliefRow { margin: 16px 0; }
  #reliefRow input { width: 220px; }
  #reliefVal { color: #ffd27a; font-weight: bold; }
  .hidden { display: none !important; }
  .tag { display:inline-block; padding:1px 6px; background:#443; border-radius:4px; font-size:11px; margin:0 2px; }
</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>
<div id="app">
  <canvas id="gl"></canvas>
  <div id="ui">
    <div id="topbar">
      <span class="res">兵符 <b id="bingfu">30</b></span>
      <span class="res">粮草 <b id="liangcao">150</b></span>
      <span class="res">在场 <b id="liveN">0</b>/12</span>
      <span class="res">核心 <b id="coreHp">—</b></span>
      <span class="res">⏱ <b id="timer">0:00</b></span>
      <span class="res" id="weatherBadge">☀ 晴</span>
      <span id="alertBadge">警报 Lv.0</span>
    </div>
    <div id="hint" class="hidden"></div>
    <div id="orderbar">
      <button class="orderbtn" data-order="focus"><span class="k">F</span>集火</button>
      <button class="orderbtn" data-order="retreat"><span class="k">G</span>后撤</button>
      <button class="orderbtn" data-order="charge"><span class="k">H</span>冲锋</button>
      <button class="orderbtn" data-order="hold"><span class="k">J</span>坚守</button>
      <button class="orderbtn" id="decoyBtn"><span class="k">V</span>诱饵</button>
      <button class="orderbtn" id="pauseBtn"><span class="k">Space</span>暂停</button>
      <button class="orderbtn" id="slowBtn"><span class="k">Shift</span>0.5x</button>
    </div>
    <div id="squad"></div>
    <div id="skillbar"></div>
    <div id="scoutMask">
      <h2>劫寨 · 祝家庄</h2>
      <div style="font-size:15px;color:#cbb">选择一个梁山号令，然后开战</div>
      <div id="orderChoice" style="display:flex;gap:12px;margin:8px 0;"></div>
      <div class="count" id="scoutCount">8</div>
      <button class="bigbtn" id="startBtn">开 战</button>
      <div style="font-size:12px;color:#998;max-width:460px;text-align:center;line-height:1.7">
        操作：编队栏选将 → 点部署圈 · <span class="tag">Q</span>技能 /<span class="tag">X</span>撤兵 ·
        <span class="tag">F/G/H/J</span>指令 · <span class="tag">V</span>诱饵 ·
        <span class="tag">Space</span>暂停 <span class="tag">Shift</span>慢放 · 右键旋转/滚轮缩放
      </div>
    </div>
    <div id="endPanel">
      <div id="endCard">
        <h1 id="endTitle">胜利</h1>
        <div id="stars"></div>
        <div id="endInfo"></div>
        <div id="reliefRow">
          拨济贫民 <input type="range" id="reliefRange" min="20" max="30" value="20"> <span id="reliefVal">20%</span>
        </div>
        <div id="reliefOut" style="min-height:22px;color:#9d8;margin-bottom:10px;"></div>
        <button class="bigbtn" id="againBtn">再战一局</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="src/raid/main_raid.js"></script>
</body>
</html>
